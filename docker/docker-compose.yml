services:
  ollama:
    image: ollama/ollama:latest
    container_name: deeptutor-ollama
    ports:
      - "11435:11434"
    volumes:
      # 使用实际复制的模型数据（非挂载）
      - ./ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # GPU 支持（需要 NVIDIA Docker Runtime）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
